name: Manager Approval Handler

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle-manager-approval:
    name: Handle manager approval
    if: >
      github.event.review.state == 'approved' &&
      github.event.review.user.login == vars.MANAGER_GITHUB_USERNAME
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark PR approved
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ["manager-approved"]
            });

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr.number,
                name: "manager-approval-timeout"
              });
            } catch (error) {
              core.info("Timeout label not present or could not be removed.");
            }

            const payload = {
              repository: `${owner}/${repo}`,
              pr_number: pr.number,
              pr_url: pr.html_url,
              title: pr.title,
              approved_by: context.payload.review.user.login
            };

            const fs = require("fs");
            fs.writeFileSync("manager-approved.json", JSON.stringify(payload, null, 2));

      - name: Email approval confirmation
        run: python3 scripts/notify_manager.py --template approved --payload-file manager-approved.json

      - name: Enable auto-merge after required checks pass
        shell: bash
        run: |
          set +e
          gh pr merge "${{ github.event.pull_request.html_url }}" --squash --auto --delete-branch
          status=$?
          if [[ "$status" -ne 0 ]]; then
            gh pr comment "${{ github.event.pull_request.html_url }}" \
              --body "Manager approval received. Auto-merge could not be enabled. Please ensure repository auto-merge is enabled, or merge manually after required checks pass."
          fi
          exit 0
