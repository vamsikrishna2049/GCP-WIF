name: Manager Approval Reminder

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  remind-manager:
    name: Send manager reminders
    runs-on: ubuntu-latest

    env:
      MANAGER_GITHUB_USERNAME: ${{ vars.MANAGER_GITHUB_USERNAME }}
      MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find pending manager approvals
        id: pending
        uses: actions/github-script@v7
        with:
          script: |
            const manager = process.env.MANAGER_GITHUB_USERNAME;
            if (!manager) {
              core.setFailed("Repository variable MANAGER_GITHUB_USERNAME is required.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date();
            const pending = [];

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            for (const pr of prs) {
              const labels = pr.labels.map(label => label.name);
              if (!labels.includes("manager-approval-required")) {
                continue;
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });

              const approved = reviews.some(review =>
                review.user &&
                review.user.login === manager &&
                review.state === "APPROVED"
              );

              if (approved) {
                continue;
              }

              const created = new Date(pr.created_at);
              const ageMinutes = Math.floor((now - created) / 60000);
              const timedOut = ageMinutes >= 120;

              if (timedOut && !labels.includes("manager-approval-timeout")) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: ["manager-approval-timeout"]
                });

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: "Manager approval SLA exceeded. Approval was not received within 2 hours."
                });
              }

              pending.push({
                number: pr.number,
                title: pr.title,
                url: pr.html_url,
                author: pr.user.login,
                age_minutes: ageMinutes,
                sla_status: timedOut ? "EXCEEDED_2_HOURS" : "PENDING"
              });
            }

            const fs = require("fs");
            fs.writeFileSync("manager-reminders.json", JSON.stringify({ pull_requests: pending }, null, 2));
            core.setOutput("count", pending.length.toString());

      - name: Email manager reminder
        if: steps.pending.outputs.count != '0'
        run: python3 scripts/notify_manager.py --template reminder --payload-file manager-reminders.json
